<body>
 <h1>Sanitización, Normalización y Trimming de Datos</h1>
    <!--Formulario para ingresar el nombre y la edad-->
    <form method="post" action="../../PHP/Problema5.php">

        <label for="nombre">Ingrese su Nombre</label>
        <input type="text" name="nombre" id="nombre" placeholder="Ej. José Pérez" required>
        <br><br>
        <label for="edad">Ingrese su Edad:</label>
        <input type="number" name="edad" id="edad" min="0" step="1" placeholder="Ej. 25" required>
        <br>
        <button type="submit" value="confirmar">Confirmar</button>
        <button onclick="window.location.href='../Home.html'">Volver al inicio</button>
    </form>

</body>
